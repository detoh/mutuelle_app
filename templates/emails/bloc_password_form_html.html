                        {% if form.obj %}
                        <div class="mb-3">
                            <label class="form-label fw-bold"><i class="fas fa-lock"></i> Mot de passe</label>
                            <input type="password" name="password" class="form-control">
                            <small class="text-muted">Laissez vide pour conserver le mot de passe actuel</small>
                        </div>
                        {% else %}
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            Un mot de passe temporaire sera généré automatiquement et envoyé par email au nouveau membre.
                        </div>
                        {% endif %}
