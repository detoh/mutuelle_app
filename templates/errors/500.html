<!-- templates/errors/500.html -->
{% extends "base.html" %}

{% block title %}Erreur Serveur - 500{% endblock %}

{% block content %}
<div class="container text-center mt-5">
    <i class="fas fa-server fa-5x text-danger mb-4"></i>
    <h1 class="display-1 fw-bold">500</h1>
    <h2 class="mb-4">Erreur Serveur</h2>
    <p class="lead text-muted mb-4">Une erreur inattendue s'est produite.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
        <i class="fas fa-home"></i> Retour à l'Accueil
    </a>
    <a href="javascript:location.reload()" class="btn btn-outline-secondary btn-lg">
        <i class="fas fa-redo"></i> Actualiser
    </a>
</div>
{% endblock %}
